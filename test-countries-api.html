<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API Phim Theo Quốc Gia</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-8">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">Test API Phim Theo Quốc Gia</h1>

        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3 mb-8">
            <button onclick="testCountry('viet-nam', 'Việt Nam')"
                class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded">
                🇻🇳 Việt Nam
            </button>
            <button onclick="testCountry('han-quoc', 'Hàn Quốc')"
                class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded">
                🇰🇷 Hàn Quốc
            </button>
            <button onclick="testCountry('trung-quoc', 'Trung Quốc')"
                class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded">
                🇨🇳 Trung Quốc
            </button>
            <button onclick="testCountry('nhat-ban', 'Nhật Bản')"
                class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded">
                🇯🇵 Nhật Bản
            </button>
            <button onclick="testCountry('thai-lan', 'Thái Lan')"
                class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded">
                🇹🇭 Thái Lan
            </button>
            <button onclick="testCountry('au-my', 'Âu Mỹ')" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded">
                🇺🇸 Âu Mỹ
            </button>
            <button onclick="testCountry('hong-kong', 'Hồng Kông')"
                class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded">
                🇭🇰 Hồng Kông
            </button>
            <button onclick="testCountry('dai-loan', 'Đài Loan')"
                class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded">
                🇹🇼 Đài Loan
            </button>
            <button onclick="testCountry('an-do', 'Ấn Độ')" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded">
                🇮🇳 Ấn Độ
            </button>
            <button onclick="testCountry('anh', 'Anh')" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded">
                🇬🇧 Anh
            </button>
            <button onclick="testCountry('phap', 'Pháp')" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded">
                🇫🇷 Pháp
            </button>
            <button onclick="testCountry('canada', 'Canada')" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded">
                🇨🇦 Canada
            </button>
            <button onclick="testCountry('duc', 'Đức')" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded">
                🇩🇪 Đức
            </button>
            <button onclick="testCountry('tay-ban-nha', 'Tây Ban Nha')"
                class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded">
                🇪🇸 Tây Ban Nha
            </button>
            <button onclick="testCountry('indonesia', 'Indonesia')"
                class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded">
                🇮🇩 Indonesia
            </button>
            <button onclick="testCountry('nga', 'Nga')" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded">
                🇷🇺 Nga
            </button>
            <button onclick="testCountry('mexico', 'Mexico')" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded">
                🇲🇽 Mexico
            </button>
            <button onclick="testCountry('brazil', 'Brazil')" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded">
                🇧🇷 Brazil
            </button>
        </div>

        <div id="result" class="bg-gray-800 p-6 rounded-lg mb-6">
            <p class="text-gray-400">Chọn quốc gia để test API...</p>
        </div>

        <div id="movies" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
        </div>
    </div>

    <script>
        async function testCountry(countrySlug, countryName) {
            const resultDiv = document.getElementById('result');
            const moviesDiv = document.getElementById('movies');

            resultDiv.innerHTML = `<p class="text-yellow-400">Đang tải phim ${countryName}...</p>`;
            moviesDiv.innerHTML = '';

            try {
                const url = `https://ophim1.com/v1/api/quoc-gia/${countrySlug}?page=1`;
                console.log('Fetching:', url);

                const response = await fetch(url, {
                    method: 'GET',
                    headers: { 'accept': 'application/json' }
                });

                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Data:', data);

                if (data.status === 'success' && data.data) {
                    const items = data.data.items || [];
                    const params = data.data.params || {};
                    const pagination = params.pagination || {};

                    resultDiv.innerHTML = `
                        <div class="space-y-2">
                            <p class="text-green-400 font-bold text-xl">✅ ${countryName}</p>
                            <p>📄 Trang: ${pagination.currentPage || 1} / ${pagination.totalPages || 'N/A'}</p>
                            <p>🎬 Số phim trên trang: ${items.length}</p>
                            <p>📊 Tổng số phim: ${pagination.totalItems || 'N/A'}</p>
                            <p>🔗 Slug: <code class="text-yellow-400">${countrySlug}</code></p>
                        </div>
                    `;

                    // Render movies
                    moviesDiv.innerHTML = items.slice(0, 12).map(movie => `
                        <div class="bg-gray-700 rounded-lg overflow-hidden">
                            <img src="https://img.ophim.live/uploads/movies/${movie.thumb_url}" 
                                alt="${movie.name}"
                                class="w-full aspect-[2/3] object-cover"
                                onerror="this.src='https://via.placeholder.com/200x300?text=No+Image'">
                            <div class="p-2">
                                <p class="text-xs font-bold truncate">${movie.name}</p>
                                <p class="text-[10px] text-gray-400">${movie.year || 'N/A'}</p>
                            </div>
                        </div>
                    `).join('');

                } else {
                    resultDiv.innerHTML = `
                        <p class="text-red-400">❌ ${countryName}: ${data.message || 'Invalid response'}</p>
                        <pre class="text-xs mt-2 overflow-auto">${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `
                    <p class="text-red-400">❌ ${countryName}: ${error.message}</p>
                `;
            }
        }

        // Auto test Vietnam on load
        window.onload = () => testCountry('viet-nam', 'Việt Nam');
    </script>
</body>

</html>
