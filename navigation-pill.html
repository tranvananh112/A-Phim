<!DOCTYPE html>
<html lang="vi">

<head>
    <style id="aphim-tawk-hide-guard">
        /* A Phim: Decisive Tawk.to Hide Guard - Prevent FOUC on Mobile/Desktop */
        #tawk-widget-layer, [id^="tawk-"], [class^="tawk-"], [class*=" tawk-"], [id*="tawkchat"], iframe[title*="chat widget" i], iframe[src*="tawk.to"], .tawk-min-container, .tawk-button {
            display: none !important; opacity: 0 !important; visibility: hidden !important; pointer-events: none !important;
            width: 0 !important; height: 0 !important; z-index: -9999 !important; position: fixed !important; left: -9999px !important;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pill Navigation - CineStream</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
        <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f2f20d",
                        "primary-dim": "#b3b30a",
                        "primary-red": "#ec1313",
                        "background-light": "#f8f8f5",
                        "background-dark": "#1e202c",
                        "surface-dark": "#282a3a",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "vietnam": ["Be Vietnam Pro", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        /* Glass pill effect */
        .nav-pill {
            position: relative;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* Glow effect on hover */
        .nav-pill:hover {
            box-shadow: 0 0 20px rgba(242, 242, 13, 0.3),
                inset 0 0 20px rgba(242, 242, 13, 0.2);
        }
