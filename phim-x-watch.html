        // Multiple CORS Proxies for fallback (ISP blocking bypass)
        const CORS_PROXIES = [
            'https://corsproxy.io/?',
            'https://api.codetabs.com/v1/proxy?quest=',
            'https://proxy.cors.sh/',
            'https://api.allorigins.win/raw?url='

        // Fetch with multiple proxy fallback
        async function fetchWithProxy(url, options = {}, timeout = 10000) {
            const errors = [];

            for (let i = 0; i < CORS_PROXIES.length; i++) {
                const proxy = CORS_PROXIES[i];
                const proxyUrl = proxy + encodeURIComponent(url);

                try {
                    console.log(`🔄 Trying proxy ${i + 1}/${CORS_PROXIES.length}: ${proxy.substring(0, 30)}...`);

                    // Create abort controller for timeout
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), timeout);

                    const response = await fetch(proxyUrl, {
                        ...options,
                        signal: controller.signal
                    });

                    clearTimeout(timeoutId);

                    if (response.ok) {
                        console.log(`✅ Proxy ${i + 1} succeeded!`);
                        return response;
                    } else {
                        throw new Error(`HTTP ${response.status}`);
                    }
                } catch (error) {
                    const errorMsg = error.name === 'AbortError' ? 'Timeout' : error.message;
                    console.warn(`❌ Proxy ${i + 1} failed: ${errorMsg}`);
                    errors.push(`Proxy ${i + 1}: ${errorMsg}`);
                }
            }

            // All proxies failed
            throw new Error(`All proxies failed. Errors: ${errors.join(', ')}`);
        }

        // Get video ID from URL

        const videoId = urlParams.get('id');
        const videoServer = parseInt(urlParams.get('server')) || 2;
        const videoTitle = urlParams.get('title') || 'Video';

        // Load video on page load
        if (videoId) {
            loadVideo(videoId, videoServer);
            loadRelatedVideos();
            loadMoreVideos();
        } else {
            window.location.href = 'phim-x.html';

        async function loadVideo(id, server) {
            console.log('🎬 Loading video:', id, 'Server:', server);

            // Set title
            document.getElementById('video-title').textContent = decodeURIComponent(videoTitle);

            const playerBox = document.getElementById('player-box');

            if (server === 1) {
                // Server 1: RapidAPI Pornhub
                playerBox.innerHTML = `
                    <iframe 
                        src="https://www.pornhub.com/embed/${id}" 
                        allowfullscreen 
                        allow="autoplay; fullscreen"
                        sandbox="allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"
                    ></iframe>

            } else {
                // Server 2: Eporner
                try {
                    const apiUrl = `https://www.eporner.com/api/v2/video/id/?id=${id}&thumbsize=big&format=json`;

                    console.log('🔄 Loading via multiple proxy fallback');
                    const response = await fetchWithProxy(apiUrl);

                                allowfullscreen 
                                allow="autoplay; fullscreen"
                                sandbox="allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"
                            ></iframe>
                        `;

                        // Update video info
                        document.getElementById('video-title').textContent = data.title || videoTitle;
                        document.getElementById('video-meta').innerHTML = `

                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                            </span>

                                </svg>

        async function loadRelatedVideos() {
            const grid = document.getElementById('related-grid');
            grid.innerHTML = '<div style="text-align: center; padding: 40px; color: #666;">Đang tải...</div>';

            try {
                const apiUrl = `https://www.eporner.com/api/v2/video/search/?query=hot&per_page=12&page=1&thumbsize=big&order=top-weekly&gay=0&lq=1&format=json`;

                const response = await fetchWithProxy(apiUrl);
                const data = await response.json();

                if (data.videos && data.videos.length > 0) {
                    grid.innerHTML = data.videos.map(v => `

                console.error('Error loading related videos:', error);

            }
        }

        async function loadMoreVideos() {
            const grid = document.getElementById('more-videos-grid');
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #666;">Đang tải...</div>';

            try {
                const apiUrl = `https://www.eporner.com/api/v2/video/search/?query=trending&per_page=20&page=1&thumbsize=big&order=top-weekly&gay=0&lq=1&format=json`;

                const response = await fetchWithProxy(apiUrl);
                const data = await response.json();

                if (data.videos && data.videos.length > 0) {
                    grid.innerHTML = data.videos.map(v => `
                        <div class="vc" onclick="goToVideo('${v.id}', 2, '${encodeURIComponent(v.title)}')">
                            <div class="vc-thumb">
                                <img src="${v.default_thumb?.src || ''}" alt="${v.title}" loading="lazy">
                                <div class="vc-dur">${v.length_min || 'N/A'}</div>
                                <div class="vc-hd">HD</div>
                            </div>
                            <div class="vc-content">
                                <div class="vc-title">${v.title}</div>
                                <div class="vc-meta">${typeof v.views === 'number' ? v.views.toLocaleString() : v.views} views</div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading more videos:', error);
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #666;">Không thể tải video</div>';
            }
        }

        // Action button functions
        function toggleFavorite() {
            const btn = event.currentTarget;
            btn.classList.toggle('active');
            const isActive = btn.classList.contains('active');
            console.log(isActive ? '❤️ Added to favorites' : '💔 Removed from favorites');
        }

        function toggleSave() {
            const btn = event.currentTarget;
            btn.classList.toggle('active');
            const isActive = btn.classList.contains('active');
            console.log(isActive ? '📌 Saved' : '🗑️ Unsaved');
        }

        function shareVideo() {
            const url = window.location.href;
            const title = document.getElementById('video-title').textContent;

            if (navigator.share) {
                navigator.share({
                    title: title,
                    url: url
                }).then(() => {
                    console.log('✅ Shared successfully');
                }).catch(err => {
                    console.log('❌ Share failed:', err);
                    copyToClipboard(url);
                });
            } else {
                copyToClipboard(url);
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ Đã copy link vào clipboard!');
            }).catch(err => {
                console.error('Copy failed:', err);
            });
        }

        function goToVideo(id, server, title) {
            window.location.href = `phim-x-watch.html?id=${id}&server=${server}&title=${title}`;
        }

        // ============================================================
        // Auto-hide Navigation on Scroll
        // ============================================================
        let lastScrollTop = 0;
        let scrollTimeout;
        const header = document.getElementById('site-header');

        window.addEventListener('scroll', function () {
            clearTimeout(scrollTimeout);

            scrollTimeout = setTimeout(() => {
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;

                if (scrollTop > lastScrollTop && scrollTop > 100) {
                    // Scrolling down & past 100px
                    header.classList.add('hidden');
                } else {
                    // Scrolling up
                    header.classList.remove('hidden');
                }

                lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
            }, 10);
        }, { passive: true });

        console.log('🎬 Phim X Watch Page Loaded!');
    </script>
