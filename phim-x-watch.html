    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f0f0f;
            --bg2: #161616;
            --bg3: #282a3a;
            --border: rgba(255, 255, 255, 0.08);
            --text: #f1f1f1;
            --text2: #aaa;
            --text3: #666;
            --orange: #f97316;
            --purple: #9333ea;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Be Vietnam Pro', sans-serif;
            min-height: 100vh;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        /* ===== HEADER ===== */
        #site-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(15, 15, 15, 0.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            transition: transform 0.3s ease-in-out;
        }

        #site-header.hidden {
            transform: translateY(-100%);
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-badge {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--orange), #dc2626);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 900;
            color: white;
        }

        .logo-name {
            font-weight: 800;
            font-size: 18px;
            color: var(--text);
        }

        .logo-name span {
            color: var(--orange);
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text2);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .back-btn:hover {
            border-color: var(--orange);
            color: var(--text);
        }

        /* ===== CONTENT ===== */
        #content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            padding-top: 90px;
            /* Header height (56px) + spacing (34px) */
        }

        /* Player Container */
        .player-container {
            margin-bottom: 0;
        }

        #player-box {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(249, 115, 22, 0.2);
        }

        #player-box iframe,
        #player-box video {
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-info {
            background: linear-gradient(135deg, var(--bg2) 0%, #1a1a1a 100%);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        .video-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 16px;
            line-height: 1.4;
        }

        .video-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            color: var(--text2);
            font-size: 14px;
            align-items: center;
            margin-bottom: 20px;
        }

        .video-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .video-description {
            color: var(--text2);
            font-size: 14px;
            line-height: 1.7;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .action-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text2);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: rgba(249, 115, 22, 0.1);
            border-color: var(--orange);
            color: var(--orange);
            transform: translateY(-2px);
        }

        .action-btn.active {
            background: rgba(249, 115, 22, 0.15);
            border-color: var(--orange);
            color: var(--orange);
        }

        .action-btn svg {
            transition: all 0.2s;
        }

        .action-btn:hover svg {
            transform: scale(1.1);
        }

        .action-btn.active svg {
            fill: var(--orange);
        }

        /* Sidebar */
        aside {
            position: sticky;
            top: 100px;
            /* Adjusted for fixed header */
            max-height: calc(100vh - 120px);
            overflow-y: auto;
        }

        aside::-webkit-scrollbar {
            width: 4px;
        }

        aside::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 2px;
        }

        .sidebar-header {
            font-size: 16px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--orange);
        }

        /* Related Videos Grid - Vertical List for Sidebar */
        #related-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .vc {
            cursor: pointer;
            transition: transform 0.15s;
            display: flex;
            gap: 12px;
        }

        .vc:hover {
            transform: translateX(4px);
        }

        .vc-thumb {
            position: relative;
            width: 160px;
            flex-shrink: 0;
            aspect-ratio: 16/9;
            border-radius: 8px;
            overflow: hidden;
            background: #222;
        }

        .vc-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .vc:hover .vc-thumb img {
            transform: scale(1.08);
        }

        .vc-dur {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: rgba(0, 0, 0, 0.88);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 5px;
            border-radius: 3px;
        }

        .vc-hd {
            position: absolute;
            top: 4px;
            left: 4px;
            background: var(--orange);
            color: #fff;
            font-size: 8px;
            font-weight: 800;
            padding: 2px 4px;
            border-radius: 3px;
            letter-spacing: 0.5px;
        }

        .vc-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .vc-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
            margin-bottom: 6px;
        }

        .vc-meta {
            font-size: 11px;
            color: var(--text2);
        }

        /* More Videos Section */
        .more-videos-section {
            margin-top: 48px;
            padding-top: 32px;
            border-top: 2px solid var(--border);
        }

        .section-header {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title svg {
            color: var(--orange);
        }

        #more-videos-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
        }

        #more-videos-grid .vc {
            flex-direction: column;
            gap: 0;
        }

        #more-videos-grid .vc-thumb {
            width: 100%;
            margin-bottom: 10px;
        }

        #more-videos-grid .vc-content {
            display: block;
        }

        #more-videos-grid .vc:hover {
            transform: translateY(-4px);
        }

        #more-videos-grid .vc-title {
            font-size: 13px;
            margin-bottom: 6px;
        }

        #more-videos-grid .vc-meta {
            font-size: 12px;
        }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            color: var(--text2);
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .vc-thumb {
                width: 140px;
            }

            #more-videos-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 900px) {
            aside {
                position: static;
                max-height: none;
            }

            #related-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .vc {
                flex-direction: column;
            }

            .vc-thumb {
                width: 100%;
            }

            .vc:hover {
                transform: translateY(-2px);
            }

            #more-videos-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .action-buttons {
                flex-wrap: wrap;
            }

            .action-btn {
                flex: 1 1 calc(50% - 6px);
                min-width: 140px;
            }
        }

        @media (max-width: 640px) {
            .header-inner {
                padding: 0 12px;
                height: 52px;
            }

            .logo-badge {
                width: 28px;
                height: 28px;
                font-size: 14px;
            }

            .logo-name {
                font-size: 16px;
            }

            #content {
                padding: 12px;
                padding-top: 70px;
                /* Mobile: Header (52px) + spacing (18px) */
            }

            #player-box {
                border-radius: 12px;
            }

            .video-info {
                padding: 16px;
                border-radius: 12px;
            }

            .video-title {
                font-size: 18px;
            }

            .video-meta {
                font-size: 12px;
                gap: 8px;
            }

            .video-meta span {
                padding: 4px 8px;
                font-size: 11px;
            }

            .sidebar-header {
                font-size: 14px;
            }

            #related-grid {
                gap: 10px;
            }

            #more-videos-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .section-title {
                font-size: 18px;
            }

            .action-buttons {
                gap: 8px;
            }

            .action-btn {
                padding: 10px 12px;
                font-size: 12px;
            }

            .action-btn span {
                display: none;
            }

            .action-btn svg {
                margin: 0;
            }
        }

        /* ===== SVIVA8 BANNER STYLES ===== */
        .sviva8-banner-section {
            margin: 18px 0;
            width: 100%;
        }
        .sviva8-banner-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .sviva8-banner-link {
            display: block;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(255, 60, 120, 0.35);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            text-decoration: none;
        }
        .sviva8-banner-link:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 32px rgba(255, 60, 120, 0.55);
        }
        .sviva8-banner-link img {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 12px;
        }
        .sviva8-banner-large img { max-height: 140px; }
        .sviva8-banner-medium img { max-height: 110px; }
        .sviva8-banner-small img { max-height: 90px; }
        .sviva8-label {
            text-align: center;
            font-size: 11px;
            color: var(--text3);
            margin-bottom: 6px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        /* SVIVA8 POPUP */
        #sviva8-popup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.82);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            animation: fadeInOverlay 0.3s ease;
        }
        @keyframes fadeInOverlay { from{opacity:0} to{opacity:1} }
        #sviva8-popup-box {
            position: relative;
            max-width: 520px;
            width: 94%;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(255,60,120,0.45), 0 4px 20px rgba(0,0,0,0.8);
            animation: popupSlideUp 0.35s cubic-bezier(.175,.885,.32,1.275);
        }
        @keyframes popupSlideUp {
            from{opacity:0;transform:scale(0.85) translateY(30px)}
            to{opacity:1;transform:scale(1) translateY(0)}
        }
        #sviva8-popup-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #e8073a;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 7px 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 10px rgba(232,7,58,0.5);
            transition: background 0.2s, transform 0.15s;
            font-family: 'Be Vietnam Pro', sans-serif;
        }
        #sviva8-popup-close:hover { background:#c4062e; transform:scale(1.05); }
        #sviva8-popup-banner-link img { display:block; width:100%; border-radius:18px; }
        @media (max-width: 640px) {
            .sviva8-banner-large img { max-height: 100px; }
            .sviva8-banner-medium img { max-height: 80px; }
            .sviva8-banner-row { gap: 8px; }
        }
    </style>
</head>
