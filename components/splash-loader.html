<!-- Splash Screen Loader Component -->
<!-- Add this to <head> section of all pages -->

<!-- Splash Loader CSS - Load first for immediate display -->
<link rel="stylesheet" href="/css/splash-loader.css">

<!-- Splash Loader Script - Load immediately, not deferred -->
<script src="/js/splash-loader.js"></script>

<!-- 
Usage Instructions:
1. Add the above 2 lines to the <head> section of every page
2. Place them BEFORE other CSS/JS files for fastest display
3. The splash screen will automatically show and hide
4. Minimum display time: 800ms
5. Maximum display time: 5 seconds (fallback)

Example placement in <head>:
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Page Title</title>
    
    <!-- Splash Loader - Add here -->
<link rel="stylesheet" href="/css/splash-loader.css">
<script src="/js/splash-loader.js"></script>

<!-- Other CSS and JS files -->
...
</head>
-->
