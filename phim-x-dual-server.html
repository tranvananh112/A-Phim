<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phim X - Dual Server</title>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QYK5R13WK2"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-QYK5R13WK2');
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f0f;
            color: #f1f1f1;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        h1 {
            color: #f97316;
            margin-bottom: 30px;
            text-align: center;
        }

        .server-selector {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .server-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .server-btn {
            flex: 1;
            min-width: 200px;
            padding: 16px 24px;
            background: #2a2a2a;
            border: 2px solid #444;
            border-radius: 8px;
            color: #f1f1f1;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .server-btn:hover {
            border-color: #f97316;
            background: #333;
        }

        .server-btn.active {
            background: #f97316;
            border-color: #f97316;
            color: #000;
        }

        .server-info {
            padding: 12px;
            background: #0a0a0a;
            border-radius: 8px;
            font-size: 13px;
            color: #888;
        }

        .controls {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #f1f1f1;
            font-size: 14px;
        }

        button {
            background: #f97316;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.3s;
        }

        button:hover {
            background: #ea580c;
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .video-section {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .video-player {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .video-player iframe,
        .video-player video {
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-info {
            padding: 16px;
            background: #0a0a0a;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .video-info h2 {
            color: #f97316;
            margin-bottom: 12px;
            font-size: 20px;
        }

        .video-info p {
            color: #aaa;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .video-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, border-color 0.3s;
        }

        .video-card:hover {
            transform: translateY(-4px);
            border-color: #f97316;
        }

        .video-card img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
        }

        .video-card-info {
            padding: 12px;
        }

        .video-card-title {
            color: #f1f1f1;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-card-meta {
            color: #888;
            font-size: 12px;
        }

        .status {
            padding: 12px 16px;
            background: #0a0a0a;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .status.loading {
            color: #3b82f6;
        }

        .status.success {
            color: #10b981;
        }

        .status.error {
            color: #ef4444;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }

        .badge.server1 {
            background: #3b82f6;
            color: white;
        }

        .badge.server2 {
            background: #10b981;
            color: white;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            h1 {
                font-size: 24px;
                margin-bottom: 20px;
            }

            .server-selector,
            .controls,
            .video-section {
                padding: 16px;
                margin-bottom: 16px;
            }

            .server-buttons {
                flex-direction: column;
                gap: 10px;
            }

            .server-btn {
                min-width: 100%;
                padding: 14px 16px;
            }

            .server-btn div:first-child {
                font-size: 20px !important;
                margin-bottom: 6px !important;
            }

            .search-box {
                flex-direction: column;
                gap: 8px;
            }

            input {
                width: 100%;
                padding: 12px;
                font-size: 16px;
                /* Prevent zoom on iOS */
            }

            button {
                width: 100%;
                padding: 14px;
                font-size: 16px;
            }

            .video-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .video-card-title {
                font-size: 15px;
            }

            .video-card-meta {
                font-size: 13px;
            }

            .video-info h2 {
                font-size: 18px;
            }

            .video-info p {
                font-size: 13px;
            }

            .video-player {
                border-radius: 4px;
            }

            .server-info {
                font-size: 12px;
                padding: 10px;
            }

            .status {
                font-size: 13px;
                padding: 10px 12px;
            }
        }

        /* Small mobile devices */
        @media (max-width: 480px) {
            body {
                padding: 8px;
            }

            h1 {
                font-size: 20px;
                margin-bottom: 16px;
            }

            .server-selector,
            .controls,
            .video-section {
                padding: 12px;
                border-radius: 8px;
            }

            .server-btn {
                padding: 12px;
            }

            .video-grid {
                gap: 12px;
            }

            .video-card-info {
                padding: 10px;
            }
        }

        /* Landscape mobile */
        @media (max-width: 768px) and (orientation: landscape) {
            .video-player {
                max-height: 70vh;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎬 Phim X - Dual Server System</h1>

        <div class="server-selector">
            <h2 style="color: #f97316; margin-bottom: 16px;">🔧 Chọn Server</h2>
            <div class="server-buttons">
                <button class="server-btn active" onclick="selectServer(1)">
                    <div style="font-size: 24px; margin-bottom: 8px;">🔵</div>
                    <div>Server 1 - RapidAPI</div>
                    <div style="font-size: 11px; margin-top: 4px; opacity: 0.7;">Pornhub API (Premium)</div>
                </button>
                <button class="server-btn" onclick="selectServer(2)">
                    <div style="font-size: 24px; margin-bottom: 8px;">🟢</div>
                    <div>Server 2 - Eporner/RedTube</div>
                    <div style="font-size: 11px; margin-top: 4px; opacity: 0.7;">Direct MP4 Stream</div>
                </button>
            </div>
            <div class="server-info" id="serverInfo">
                <strong>Server 1 (RapidAPI):</strong> Sử dụng Pornhub API qua RapidAPI. Có thể bị giới hạn quota.
            </div>
        </div>

        <div class="controls">
            <h2 style="color: #f97316; margin-bottom: 16px;">🔍 Tìm kiếm video</h2>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Nhập từ khóa tìm kiếm..." value="asian">
                <button onclick="searchVideos()">Tìm kiếm</button>
            </div>
            <div id="searchStatus" class="status" style="display: none;"></div>
        </div>

        <div class="video-section" id="playerSection" style="display: none;">
            <h2 style="color: #f97316; margin-bottom: 16px;">📺 Video Player</h2>

            <div class="video-info" id="videoInfo"></div>

            <div class="video-player" id="videoPlayer">
                <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #666;">
                    Chọn video để phát
                </div>
            </div>
        </div>

        <div class="video-section">
            <h2 style="color: #f97316; margin-bottom: 16px;">📋 Danh sách video</h2>
            <div id="videoGrid" class="video-grid">
                <p style="color: #666; text-align: center; padding: 40px;">
                    Chọn server và nhập từ khóa để tìm kiếm
                </p>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE = 'http://localhost:5000/api/adult';
        const RAPIDAPI_KEY = 'd486069129msh0b8da27c0be5495p1d859djsn1739664b1f9a';
        const RAPIDAPI_HOST = 'pornhub-api-xnxx.p.rapidapi.com';

        let currentServer = 1;
        let currentVideos = [];

        function selectServer(serverNum) {
            currentServer = serverNum;

            // Update UI
            document.querySelectorAll('.server-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', idx + 1 === serverNum);
            });

            // Update info
            const info = document.getElementById('serverInfo');
            if (serverNum === 1) {
                info.innerHTML = '<strong>Server 1 (RapidAPI):</strong> Sử dụng Pornhub API qua RapidAPI. Có thể bị giới hạn quota.';
            } else {
                info.innerHTML = '<strong>Server 2 (Eporner/RedTube):</strong> Tìm kiếm từ Eporner (ưu tiên) và RedTube (dự phòng). Hỗ trợ stream MP4 trực tiếp.';
            }

            // Clear results
            document.getElementById('videoGrid').innerHTML = '<p style="color: #666; text-align: center; padding: 40px;">Nhập từ khóa và tìm kiếm với server mới</p>';
        }

        function showStatus(message, type = 'loading') {
            const statusEl = document.getElementById('searchStatus');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
            statusEl.style.display = 'block';
        }

        function hideStatus() {
            document.getElementById('searchStatus').style.display = 'none';
        }

        async function searchVideos() {
            const query = document.getElementById('searchInput').value.trim();

            if (!query) {
                alert('Vui lòng nhập từ khóa tìm kiếm');
                return;
            }

            showStatus(`🔄 Đang tìm kiếm trên Server ${currentServer}...`, 'loading');

            try {
                let videos = [];

                if (currentServer === 1) {
                    // Server 1: RapidAPI
                    videos = await searchServer1(query);
                } else {
                    // Server 2: Eporner/RedTube
                    videos = await searchServer2(query);
                }

                if (videos.length === 0) {
                    showStatus('❌ Không tìm thấy video nào', 'error');
                    document.getElementById('videoGrid').innerHTML = '<p style="color: #666; text-align: center; padding: 40px;">Không có kết quả</p>';
                    return;
                }

                currentVideos = videos;
                showStatus(`✅ Tìm thấy ${videos.length} video từ Server ${currentServer}`, 'success');
                displayVideos(videos);

                setTimeout(hideStatus, 3000);

            } catch (error) {
                console.error('Search error:', error);
                showStatus(`❌ Lỗi: ${error.message}`, 'error');
            }
        }

        async function searchServer1(query) {
            console.log('🔍 Searching Server 1 (RapidAPI):', query);

            const response = await fetch(`https://pornhub-api-xnxx.p.rapidapi.com/api/search`, {
                method: 'POST',
                headers: {
                    'x-rapidapi-key': RAPIDAPI_KEY,
                    'x-rapidapi-host': RAPIDAPI_HOST,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ q: query, pages: 1 })
            });

            console.log('📊 Server 1 Response Status:', response.status);

            if (!response.ok) {
                const errorText = await response.text();
                console.error('❌ Server 1 Error:', errorText);

                if (response.status === 429) {
                    throw new Error(`Server 1 error: Rate limit exceeded (429). API key đã hết quota.`);
                } else if (response.status === 403) {
                    throw new Error(`Server 1 error: Forbidden (403). API key không hợp lệ.`);
                } else {
                    throw new Error(`Server 1 error: ${response.status}`);
                }
            }

            const data = await response.json();
            console.log('📦 Server 1 Data:', data);

            // RapidAPI trả về array trực tiếp hoặc object có videos
            const videos = Array.isArray(data) ? data : (data.videos || data.data || []);

            if (videos.length === 0) {
                throw new Error('Server 1: No videos found');
            }

            console.log(`✅ Server 1 found ${videos.length} videos`);

            return videos.map(v => ({
                id: v.id || v.video_id,
                title: v.title,
                thumbnail: v.thumbnail || v.thumb || v.default_thumb?.src,
                duration: v.duration || v.length_min || 'N/A',
                views: v.views || 0,
                rating: v.rating || v.rate || 0,
                embed: v.embed || v.embedUrl,
                url: v.url || v.video_url,
                server: 1,
                serverName: 'RapidAPI Pornhub'
            }));
        }

        async function searchServer2(query) {
            // Call Eporner API directly (no backend to avoid rate limit)
            const EPORNER_API = 'https://www.eporner.com/api/v2/video/search/';
            const url = `${EPORNER_API}?query=${encodeURIComponent(query)}&per_page=20&page=1&thumbsize=big&order=top-weekly&gay=0&lq=1&format=json`;

            const response = await fetch(url);

            if (!response.ok) {
                throw new Error(`Eporner API error: ${response.status}`);
            }

            const data = await response.json();

            if (!data.videos || data.videos.length === 0) {
                throw new Error('No videos found');
            }

            return data.videos.map(v => ({
                id: v.id,
                title: v.title,
                duration: v.length_min || 'N/A',
                views: typeof v.views === 'number' ? v.views.toLocaleString() : v.views,
                rating: v.rate || 'N/A',
                thumb: v.default_thumb?.src || (v.thumbs && v.thumbs[0] ? v.thumbs[0].src : null),
                embed: v.embed,
                url: v.url,
                added: v.added,
                server: 2,
                serverName: 'Eporner'
            }));
        }

        function displayVideos(videos) {
            const grid = document.getElementById('videoGrid');

            if (videos.length === 0) {
                grid.innerHTML = '<p style="color: #666; text-align: center; padding: 40px;">Không có video</p>';
                return;
            }

            grid.innerHTML = videos.map((video, index) => {
                const thumbnail = video.thumbnail || video.thumb || video.image || video.default_thumb?.src || 'https://via.placeholder.com/320x180?text=No+Image';
                const title = video.title || 'Untitled';
                const duration = video.duration || video.length_min || 'N/A';
                const views = video.views || 'N/A';

                return `
                    <div class="video-card" onclick="playVideo(${index})">
                        <img src="${getProxyImageUrl(thumbnail)}" 
                             alt="${title}"
                             onerror="this.src='https://via.placeholder.com/320x180?text=No+Image'">
                        <div class="video-card-info">
                            <div class="video-card-title">
                                ${title}
                                <span class="badge server${video.server}">${video.serverName}</span>
                            </div>
                            <div class="video-card-meta">
                                ${duration} • ${views} views
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getProxyImageUrl(imageUrl) {
            if (!imageUrl || imageUrl.includes('placeholder')) return imageUrl;
            if (currentServer === 2) {
                return `${API_BASE}/proxy-image?url=${encodeURIComponent(imageUrl)}`;
            }
            return imageUrl;
        }

        async function playVideo(index) {
            const video = currentVideos[index];

            if (!video) {
                alert('Video không tồn tại');
                return;
            }

            document.getElementById('playerSection').style.display = 'block';

            // Update video info with proper field mapping
            const duration = video.duration || video.length_min || 'N/A';
            const views = video.views || 'N/A';
            const rating = video.rating || video.rate || 'N/A';

            document.getElementById('videoInfo').innerHTML = `
                <h2>${video.title || 'Untitled'} <span class="badge server${video.server}">${video.serverName}</span></h2>
                <p><strong>Thời lượng:</strong> ${duration}</p>
                <p><strong>Lượt xem:</strong> ${views}</p>
                <p><strong>Rating:</strong> ${rating}</p>
            `;

            const playerEl = document.getElementById('videoPlayer');

            if (video.server === 1) {
                // Server 1: Use embed or construct embed URL
                await playServer1Video(video, playerEl);
            } else {
                // Server 2: Extract MP4 and use video tag
                await playServer2Video(video, playerEl);
            }

            document.getElementById('playerSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        async function playServer1Video(video, playerEl) {
            console.log('🎬 Playing Server 1 video:', video);

            let embedUrl = video.embed;

            // Try to construct embed URL from various fields
            if (!embedUrl && video.url) {
                // Extract video ID from URL
                const match = video.url.match(/viewkey=([^&]+)/);
                if (match) {
                    embedUrl = `https://www.pornhub.com/embed/${match[1]}`;
                    console.log('📺 Constructed embed from URL:', embedUrl);
                }
            }

            if (!embedUrl && video.id) {
                embedUrl = `https://www.pornhub.com/embed/${video.id}`;
                console.log('📺 Constructed embed from ID:', embedUrl);
            }

            if (!embedUrl && video.video_id) {
                embedUrl = `https://www.pornhub.com/embed/${video.video_id}`;
                console.log('📺 Constructed embed from video_id:', embedUrl);
            }

            if (embedUrl) {
                console.log('✅ Using embed URL:', embedUrl);
                playerEl.innerHTML = `
                    <iframe 
                        src="${embedUrl}" 
                        allowfullscreen 
                        allow="autoplay; fullscreen; picture-in-picture"
                        referrerpolicy="no-referrer"
                        sandbox="allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"
                    ></iframe>
                `;
            } else {
                console.error('❌ No embed URL found for video:', video);
                showFallback(video, playerEl);
            }
        }

        async function playServer2Video(video, playerEl) {
            try {
                playerEl.innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #f97316;">🔄 Đang tải video...</div>';

                // Use direct embed (no proxy to avoid CORS issues)
                if (video.embed) {
                    console.log('Using direct embed (no proxy):', video.embed);
                    playerEl.innerHTML = `
                        <iframe 
                            src="${video.embed}" 
                            allowfullscreen 
                            allow="autoplay; fullscreen; picture-in-picture"
                            referrerpolicy="no-referrer"
                            sandbox="allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"
                        ></iframe>
                    `;
                    return;
                }

                // Fallback if no embed
                throw new Error('No embed URL available');

            } catch (error) {
                console.error('Play server 2 error:', error);
                showFallback(video, playerEl);
            }
        }

        function showFallback(video, playerEl) {
            playerEl.innerHTML = `
                <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 40px; text-align: center;">
                    <div style="font-size: 48px; margin-bottom: 20px;">⚠️</div>
                    <p style="color: #f97316; font-size: 18px; margin-bottom: 12px;">Không thể phát video</p>
                    <p style="color: #888; font-size: 14px; margin-bottom: 20px;">Thử server khác hoặc mở link trực tiếp</p>
                    ${video.url || video.link ? `
                        <a href="${video.url || video.link}" target="_blank" 
                           style="display: inline-block; padding: 12px 24px; background: #f97316; color: white; text-decoration: none; border-radius: 8px; font-weight: 600;">
                            Mở video trong tab mới
                        </a>
                    ` : ''}
                </div>
            `;
        }

        // Auto search on Enter
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchVideos();
        });

        console.log('🎬 Dual Server System loaded');

        // Track page view
        if (typeof gtag !== 'undefined') {
            gtag('event', 'page_view', {
                'page_title': 'Phim X - Dual Server',
                'page_category': 'Adult Content',
                'page_location': window.location.href
            });
        }

        // Track server selection
        const originalSelectServer = selectServer;
        selectServer = function (serverNum) {
            originalSelectServer(serverNum);
            if (typeof gtag !== 'undefined') {
                gtag('event', 'select_server', {
                    'event_category': 'Adult Content',
                    'event_label': `Server ${serverNum}`,
                    'server_number': serverNum
                });
            }
        };

        // Track search
        const originalSearchVideos = searchVideos;
        searchVideos = async function () {
            const query = document.getElementById('searchInput').value.trim();
            if (typeof gtag !== 'undefined' && query) {
                gtag('event', 'search', {
                    'search_term': query,
                    'event_category': 'Adult Content',
                    'server_number': currentServer
                });
            }
            return await originalSearchVideos();
        };

        // Track video play
        const originalPlayVideo = playVideo;
        playVideo = async function (index) {
            const video = currentVideos[index];
            if (typeof gtag !== 'undefined' && video) {
                gtag('event', 'play_video', {
                    'event_category': 'Adult Content',
                    'event_label': video.title,
                    'server_number': video.server,
                    'video_id': video.id
                });
            }
            return await originalPlayVideo(index);
        };
    </script>
</body>
