<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Tất Cả Quốc Gia - API Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-8">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">📊 Thống Kê API Phim Theo Quốc Gia</h1>

        <div class="mb-6 flex gap-4">
            <button onclick="testAllCountries()" class="px-6 py-3 bg-green-600 hover:bg-green-500 rounded-lg font-bold">
                🚀 Test Tất Cả Quốc Gia
            </button>
            <button onclick="exportResults()" class="px-6 py-3 bg-blue-600 hover:bg-blue-500 rounded-lg font-bold">
                📥 Export JSON
            </button>
        </div>

        <div id="progress" class="mb-6 hidden">
            <div class="bg-gray-800 rounded-lg p-4">
                <div class="flex items-center gap-3">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-yellow-400"></div>
                    <div>
                        <p class="font-bold">Đang test...</p>
                        <p id="progressText" class="text-sm text-gray-400">0 / 0</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="results" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        </div>

        <div id="summary" class="mt-8 hidden">
            <div class="bg-gray-800 rounded-lg p-6">
                <h2 class="text-2xl font-bold mb-4">📈 Tổng Kết</h2>
                <div id="summaryContent" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <script src="js/countries.js"></script>
    <script>
        let testResults = [];

        async function testAllCountries() {
            const resultsDiv = document.getElementById('results');
            const progressDiv = document.getElementById('progress');
            const progressText = document.getElementById('progressText');
            const summaryDiv = document.getElementById('summary');

            resultsDiv.innerHTML = '';
            testResults = [];
            progressDiv.classList.remove('hidden');
            summaryDiv.classList.add('hidden');

            const countries = getAllCountries();
            let completed = 0;

            for (const country of countries) {
                progressText.textContent = `${completed} / ${countries.length} - Testing ${country.name}...`;

                const result = await testCountry(country);
                testResults.push(result);

                // Render result card
                const card = document.createElement('div');
                card.className = `bg-gray-800 rounded-lg p-4 border-l-4 ${result.success ? 'border-green-500' : 'border-red-500'}`;
                card.innerHTML = `
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="font-bold text-lg">${country.flag} ${country.name}</h3>
                        <span class="${result.success ? 'text-green-400' : 'text-red-400'} text-2xl">
                            ${result.success ? '✅' : '❌'}
                        </span>
                    </div>
                    ${result.success ? `
                        <div class="space-y-1 text-sm">
                            <p class="text-gray-300">🎬 Tổng phim: <span class="text-yellow-400 font-bold">${result.totalItems || 'N/A'}</span></p>
                            <p class="text-gray-300">📄 Tổng trang: <span class="text-blue-400 font-bold">${result.totalPages || 'N/A'}</span></p>
                            <p class="text-gray-300">📊 Phim/trang: <span class="text-green-400 font-bold">${result.itemsPerPage || 'N/A'}</span></p>
                            <p class="text-gray-400 text-xs mt-2">Slug: <code>${country.slug}</code></p>
                        </div>
                    ` : `
                        <p class="text-red-400 text-sm">${result.error}</p>
                    `}
                `;
                resultsDiv.appendChild(card);

                completed++;
                await new Promise(resolve => setTimeout(resolve, 500)); // Rate limiting
            }

            progressDiv.classList.add('hidden');
            showSummary();
        }

        async function testCountry(country) {
            try {
                const url = `https://ophim1.com/v1/api/quoc-gia/${country.slug}?page=1`;
                const response = await fetch(url, {
                    method: 'GET',
                    headers: { 'accept': 'application/json' }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                if (data.status === 'success' && data.data) {
                    const items = data.data.items || [];
                    const pagination = data.data.params?.pagination || {};

                    return {
                        country: country.name,
                        slug: country.slug,
                        flag: country.flag,
                        success: true,
                        totalItems: pagination.totalItems || items.length,
                        totalPages: pagination.totalPages || 1,
                        itemsPerPage: items.length,
                        url: url
                    };
                } else {
                    throw new Error('Invalid response format');
                }
            } catch (error) {
                return {
                    country: country.name,
                    slug: country.slug,
                    flag: country.flag,
                    success: false,
                    error: error.message
                };
            }
        }

        function showSummary() {
            const summaryDiv = document.getElementById('summary');
            const summaryContent = document.getElementById('summaryContent');

            const successful = testResults.filter(r => r.success);
            const failed = testResults.filter(r => !r.success);
            const totalMovies = successful.reduce((sum, r) => sum + (r.totalItems || 0), 0);

            // Sort by total items
            const topCountries = successful
                .sort((a, b) => (b.totalItems || 0) - (a.totalItems || 0))
                .slice(0, 10);

            summaryContent.innerHTML = `
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    <div class="bg-green-900/30 rounded-lg p-4 text-center">
                        <p class="text-3xl font-bold text-green-400">${successful.length}</p>
                        <p class="text-sm text-gray-400">Thành công</p>
                    </div>
                    <div class="bg-red-900/30 rounded-lg p-4 text-center">
                        <p class="text-3xl font-bold text-red-400">${failed.length}</p>
                        <p class="text-sm text-gray-400">Thất bại</p>
                    </div>
                    <div class="bg-blue-900/30 rounded-lg p-4 text-center">
                        <p class="text-3xl font-bold text-blue-400">${totalMovies.toLocaleString()}</p>
                        <p class="text-sm text-gray-400">Tổng phim</p>
                    </div>
                    <div class="bg-yellow-900/30 rounded-lg p-4 text-center">
                        <p class="text-3xl font-bold text-yellow-400">${Math.round(totalMovies / successful.length)}</p>
                        <p class="text-sm text-gray-400">TB phim/quốc gia</p>
                    </div>
                </div>

                <h3 class="text-xl font-bold mb-3">🏆 Top 10 Quốc Gia Nhiều Phim Nhất</h3>
                <div class="space-y-2">
                    ${topCountries.map((r, i) => `
                        <div class="flex items-center justify-between bg-gray-700/50 rounded p-3">
                            <div class="flex items-center gap-3">
                                <span class="text-2xl font-bold text-gray-500">#${i + 1}</span>
                                <span class="text-xl">${r.flag}</span>
                                <span class="font-semibold">${r.country}</span>
                            </div>
                            <span class="text-yellow-400 font-bold">${r.totalItems?.toLocaleString() || 'N/A'} phim</span>
                        </div>
                    `).join('')}
                </div>

                ${failed.length > 0 ? `
                    <h3 class="text-xl font-bold mb-3 mt-6">❌ Quốc Gia Lỗi</h3>
                    <div class="space-y-2">
                        ${failed.map(r => `
                            <div class="bg-red-900/20 rounded p-3">
                                <p class="font-semibold">${r.flag} ${r.country}</p>
                                <p class="text-sm text-red-400">${r.error}</p>
                            </div>
                        `).join('')}
                    </div>
                ` : ''}
            `;

            summaryDiv.classList.remove('hidden');
        }

        function exportResults() {
            const dataStr = JSON.stringify(testResults, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `countries-api-test-${Date.now()}.json`;
            link.click();
        }
    </script>
</body>

</html>
