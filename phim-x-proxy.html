<!DOCTYPE html>
<html lang="vi">

<head>
    <style id="aphim-tawk-hide-guard">
        /* A Phim: Decisive Tawk.to Hide Guard - Prevent FOUC on Mobile/Desktop */
        #tawk-widget-layer, [id^="tawk-"], [class^="tawk-"], [class*=" tawk-"], [id*="tawkchat"], iframe[title*="chat widget" i], iframe[src*="tawk.to"], .tawk-min-container, .tawk-button {
            display: none !important; opacity: 0 !important; visibility: hidden !important; pointer-events: none !important;
            width: 0 !important; height: 0 !important; z-index: -9999 !important; position: fixed !important; left: -9999px !important;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phim X (Proxy Mode) - Bypass VNPT</title>
    <link rel="icon" type="image/png" href="/favicon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f0f0f;
            --bg2: #161616;
            --bg3: #282a3a;
            --border: rgba(255, 255, 255, 0.08);
            --text: #f1f1f1;
            --text2: #aaa;
            --orange: #f97316;
            --pill-bg: #272727;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Be Vietnam Pro', sans-serif;
            min-height: 100vh;
        }

        #site-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15, 15, 15, 0.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text);
        }

        .logo-badge {
            width: 32px;
            height: 32px;
            background: var(--orange);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 18px;
            color: #000;
        }

        .logo-name {
            font-size: 20px;
            font-weight: 800;
        }

        .logo-name span {
            color: var(--orange);
        }

        #cat-nav {
            position: sticky;
            top: 56px;
            z-index: 99;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
        }

        .cat-nav-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            height: 52px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cat-btn {
            padding: 6px 14px;
            background: var(--pill-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text2);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .cat-btn:hover {
            background: var(--bg3);
            color: var(--text);
        }

        .cat-btn.active {
            background: var(--orange);
            color: #000;
            border-color: var(--orange);
        }

        #content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        #video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .video-card {
            background: var(--bg2);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .video-card:hover {
            transform: translateY(-4px);
        }

        .video-thumb {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: var(--bg3);
        }

        .video-thumb img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.8);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .video-title {
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-views {
            padding: 0 12px 12px;
            font-size: 12px;
            color: var(--text2);
        }

        #player-section {
            margin-bottom: 32px;
            display: none;
        }

        #player-box {
            width: 100%;
            padding-top: 56.25%;
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }

        #player-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .video-info-block {
            margin-top: 16px;
        }

        #vp-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .vp-meta {
            font-size: 14px;
            color: var(--text2);
        }

        #pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 32px;
        }

        .proxy-badge {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header id="site-header">
        <div class="header-inner">
            <a href="/" class="logo">
                <div class="logo-badge">A</div>
                <div class="logo-name">A<span>Phim</span></div>
            </a>
            <div style="flex: 1;"></div>
            <div class="proxy-badge">🛡️ Proxy Mode</div>
            <div style="font-size: 12px; color: #10b981;">Bypass VNPT/Viettel</div>
        </div>
    </header>

    <!-- Category Nav -->
    <div id="cat-nav">
        <div class="cat-nav-inner">
            <button class="cat-btn active" data-q="hot trending" onclick="selectCat(this, event)">Thịnh hành</button>
            <button class="cat-btn" data-q="Sister hot" onclick="selectCat(this, event)">Sister Hot 🔥</button>
            <button class="cat-btn" data-q="asian vietnam" onclick="selectCat(this, event)">Phim Việt</button>
            <button class="cat-btn" data-q="japanese teen" onclick="selectCat(this, event)">Nhật Bản</button>
            <button class="cat-btn" data-q="korean bj" onclick="selectCat(this, event)">Hàn Quốc</button>
            <button class="cat-btn" data-q="chinese asian" onclick="selectCat(this, event)">Trung Quốc</button>
            <button class="cat-btn" data-q="milf amateur" onclick="selectCat(this, event)">Âu Mỹ</button>
        </div>
    </div>

    <!-- Content -->
    <div id="content">
        <!-- Player Section -->
        <div id="player-section">
            <div id="player-box"></div>
            <div class="video-info-block">
                <div id="vp-title">Video Title</div>
                <div class="vp-meta" id="vp-meta"></div>
            </div>
        </div>

        <!-- Video Grid -->
        <div id="video-grid"></div>

        <!-- Pagination -->
        <div id="pagination" style="display: none;">
            <button id="prevBtn" onclick="goToPage(S.currentPage - 1)">← Prev</button>
            <div id="pageNumbers"></div>
            <button id="nextBtn" onclick="goToPage(S.currentPage + 1)">Next →</button>
        </div>
    </div>

    <!-- Load Proxy Script -->
    <script>
        // Cấu hình Backend URL
        // Thay đổi URL này thành backend của bạn
        const BACKEND_URL = 'http://localhost:5000'; // Local testing
        // const BACKEND_URL = 'https://your-backend.railway.app'; // Production
    </script>
    <script src="js/phim-x-proxy.js"></script>

    <script>
        // Override PROXY_API từ file
        if (typeof BACKEND_URL !== 'undefined') {
            window.PROXY_API = `${BACKEND_URL}/api/phimx-proxy`;
            console.log('🔧 Using backend:', BACKEND_URL);
        }
    </script>
<script src="js/ads-manager.js" defer></script>
</body>

</html>
