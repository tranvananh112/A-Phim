<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Chat - A Phim Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
    <style>
        .chat-mgmt-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
        .chat-user-card {
            display: flex; align-items: center; gap: 12px; padding: 12px;
            background: var(--surface-2); border-radius: var(--radius);
            margin-bottom: 8px; border: 1px solid var(--border);
            transition: all 0.2s;
        }
        .chat-user-card:hover { background: var(--surface-3); transform: translateY(-1px); }
        .chat-user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .chat-user-info { flex: 1; min-width: 0; }
        .chat-user-name { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-user-role { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .badge-admin { background: #fbbf24; color: #000; padding: 1px 6px; border-radius: 4px; font-size: 9px; font-weight: 800; margin-left: 5px; }
        .badge-banned { background: #ef4444; color: #fff; padding: 1px 6px; border-radius: 4px; font-size: 9px; font-weight: 800; }
        .admin-msg-row { background: rgba(251, 191, 36, 0.05) !important; }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="sidebar-logo">
            <div class="sidebar-logo-icon" style="border: 2px solid var(--primary); border-radius: 50%; padding: 4px;">
                <img src="../favicon.png" alt="A Phim" style="width: 100%; height: 100%; object-fit: contain;"/>
            </div>
            <div class="sidebar-logo-text"><h1>A Phim</h1><p>Admin Panel</p></div>
        </div>
        <nav class="sidebar-nav">
            <div class="sidebar-nav-section">
                <p class="sidebar-nav-label">Tổng quan</p>
                <a href="dashboard.html" class="sidebar-nav-item"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
            </div>
            <div class="sidebar-nav-section">
                <p class="sidebar-nav-label">Người dùng</p>
                <a href="users.html" class="sidebar-nav-item"><i data-lucide="users"></i><span>Người dùng</span></a>
                <a href="chat.html" class="sidebar-nav-item active"><i data-lucide="message-square"></i><span>Quản lý Chat</span></a>
            </div>
        </nav>
    </aside>

    <main class="admin-main">
        <header class="admin-header">
            <div class="header-left"><h2>Quản lý Chat Cộng Đồng</h2></div>
            <div class="header-right">
                <div class="header-admin">
                    <div class="header-admin-avatar">A</div>
                    <div class="header-admin-info"><p>Admin</p><span>Quản trị viên</span></div>
                </div>
            </div>
        </header>

        <div class="admin-content">
            <div class="chat-mgmt-grid">
                <div class="admin-card">
                    <div class="admin-card-header">
                        <span class="admin-card-title">Lịch sử tin nhắn (MongoDB)</span>
                        <div class="flex gap-8">
                            <select id="tabFilter" class="form-select" onchange="loadChatHistory()">
                                <option value="general">Chung</option>
                                <option value="movies">Phim</option>
                                <option value="support">Hỗ trợ</option>
                            </select>
                            <button class="btn btn-secondary btn-sm" onclick="loadChatHistory()"><i data-lucide="refresh-cw"></i></button>
                        </div>
                    </div>
                    <div class="admin-card-body">
                        <div class="table-responsive">
                            <table class="admin-table">
                                <thead>
                                    <tr>
                                        <th>Thời gian</th>
                                        <th>Người dùng</th>
                                        <th>Nội dung</th>
                                        <th>Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody id="chatHistoryTable"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="admin-card">
                    <div class="admin-card-header">
                        <span class="admin-card-title">Người dùng hệ thống</span>
                        <input type="text" id="userSearch" class="form-input" placeholder="Tìm tên/email..." style="width: 140px; height: 32px; font-size: 12px;">
                    </div>
                    <div class="admin-card-body">
                        <div id="chatUserList" style="max-height: 520px; overflow-y: auto;">
                            <div class="text-muted text-center p-4">Đang tải danh sách...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="../js/config.js"></script>
<script src="../js/admin/config.js"></script>
<script src="../js/admin/auth.js"></script>
<script>
    const token = localStorage.getItem('cinestream_admin_token') || localStorage.getItem('cinestream_token');

    async function loadChatHistory() {
        try {
            const tab = document.getElementById('tabFilter').value;
            const res = await fetch(`${API_CONFIG.BACKEND_URL}/chat/history/${tab}`);
            const data = await res.json();
            if (data.success) {
                const tbody = document.getElementById('chatHistoryTable');
                tbody.innerHTML = data.data.reverse().map(msg => `
                    <tr class="${msg.chatRole === 'admin' ? 'admin-msg-row' : ''}">
                        <td style="font-size: 11px;">
                            ${new Date(msg.createdAt).toLocaleDateString('vi-VN')}<br>
                            ${new Date(msg.createdAt).toLocaleTimeString('vi-VN')}
                        </td>
                        <td>
                            <div class="flex items-center gap-8">
                                <img src="${msg.avatar || '/favicon.png'}" style="width:24px; height:24px; border-radius:50%; object-fit:cover;">
                                <span style="font-weight:700; color:${msg.chatRole === 'admin' ? '#fbbf24' : 'inherit'}">${msg.user}</span>
                                ${msg.chatRole === 'admin' ? '<span class="badge-admin">Admin</span>' : ''}
                            </div>
                        </td>
                        <td style="max-width:300px; word-break:break-word; font-size:13px;">${msg.text}</td>
                        <td>
                            <div class="flex gap-4">
                                <button class="btn btn-icon btn-sm ${msg.isPinned ? 'text-primary' : ''}" onclick="togglePin('${msg._id}')">
                                    <i data-lucide="${msg.isPinned ? 'pin-off' : 'pin'}"></i>
                                </button>
                                <button class="btn btn-icon btn-sm text-danger" onclick="deleteMessage('${msg._id}')">
                                    <i data-lucide="trash-2"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `).join('');
                lucide.createIcons();
            }
        } catch (e) {}
    }

    async function loadChatUsers(query = '') {
        const list = document.getElementById('chatUserList');
        try {
            const url = query ? `${API_CONFIG.BACKEND_URL}/users?search=${encodeURIComponent(query)}` : `${API_CONFIG.BACKEND_URL}/users`;
            const res = await fetch(url, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (res.status === 401) {
                list.innerHTML = '<div class="text-danger text-center p-4">401: Không có quyền. Vui lòng đăng nhập lại.</div>';
                return;
            }

            const data = await res.json();
            if (data.success) {
                const users = data.data || data.users;
                if (!users || users.length === 0) {
                    list.innerHTML = '<div class="text-muted text-center p-4">Không tìm thấy người dùng</div>';
                    return;
                }
                list.innerHTML = users.map(u => `
                    <div class="chat-user-card" style="border-left: 3px solid ${u.chatRole === 'admin' ? '#fbbf24' : 'transparent'}">
                        <img src="${u.avatar || '../favicon.png'}" class="chat-user-avatar">
                        <div class="chat-user-info">
                            <div class="chat-user-name" style="color:${u.chatRole === 'admin' ? '#fbbf24' : 'inherit'}">
                                ${u.name} ${u.chatRole === 'admin' ? '<span class="badge-admin">Admin</span>' : ''}
                            </div>
                            <div class="chat-user-role">${u.email}</div>
                            <div style="margin-top:2px;">${u.isChatBanned ? '<span class="badge-banned">BỊ CẤM CHAT</span>' : ''}</div>
                        </div>
                        <div class="flex gap-4">
                            <button class="btn btn-icon btn-sm ${u.chatRole === 'admin' ? 'text-primary' : ''}" title="Đổi quyền Admin" onclick="toggleChatRole('${u._id}', '${u.chatRole}')">
                                <i data-lucide="${u.chatRole === 'admin' ? 'shield-off' : 'shield-check'}"></i>
                            </button>
                            <button class="btn btn-icon btn-sm ${u.isChatBanned ? 'text-danger' : ''}" title="${u.isChatBanned ? 'Gỡ cấm' : 'Cấm Chat'}" onclick="toggleChatBan('${u._id}', ${u.isChatBanned})">
                                <i data-lucide="${u.isChatBanned ? 'unlock' : 'lock'}"></i>
                            </button>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            }
        } catch (e) {
            list.innerHTML = '<div class="text-danger text-center p-4">Lỗi kết nối server</div>';
        }
    }

    async function toggleChatBan(uid, current) {
        if (!confirm(`${current ? 'Gỡ cấm' : 'Cấm'} chat người dùng này?`)) return;
        await fetch(`${API_CONFIG.BACKEND_URL}/users/${uid}/chat-ban`, {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        loadChatUsers(document.getElementById('userSearch').value);
    }
    
    async function toggleChatRole(uid, current) {
        const newRole = current === 'admin' ? 'user' : 'admin';
        if (!confirm(`Đổi quyền Admin cho người dùng này?`)) return;
        await fetch(`${API_CONFIG.BACKEND_URL}/users/${uid}/chat-role`, {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ role: newRole })
        });
        loadChatUsers(document.getElementById('userSearch').value);
    }

    async function deleteMessage(id) {
        if (!confirm('Xóa tin nhắn này?')) return;
        await fetch(`${API_CONFIG.BACKEND_URL}/chat/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        loadChatHistory();
    }

    async function togglePin(id) {
        await fetch(`${API_CONFIG.BACKEND_URL}/chat/pin/${id}`, {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        loadChatHistory();
    }

    function debounce(func, timeout = 300) {
        let timer;
        return (...args) => {
            clearTimeout(timer);
            timer = setTimeout(() => { func.apply(this, args); }, timeout);
        };
    }

    const debouncedSearch = debounce((query) => {
        loadChatUsers(query);
    }, 300);

    document.getElementById('userSearch').addEventListener('input', (e) => {
        debouncedSearch(e.target.value);
    });

    document.addEventListener('DOMContentLoaded', () => {
        loadChatHistory();
        loadChatUsers();
        lucide.createIcons();
    });
</script>
</body>
</html>
