<!DOCTYPE html> 
<html lang="vi"> 
 
<head> 
 <meta charset="UTF-8"> 
 <meta name="viewport"content="width=device-width, initial-scale=1.0"> 
 <title>Đăng nhập Admin - A Phim</title> 
 
 <!-- Favicon --> 
 <link rel="icon"type="image/png"href="/favicon.png"> 
 <link rel="apple-touch-icon"href="/favicon.png"> 
 
 <script src="https://cdn.tailwindcss.com"></script> 
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"rel="stylesheet"> 
 
 <script> 
 tailwind.config = { 
 theme: { 
 extend: { 
  colors: { 
  primary: '#197fe6', 
  }, 
  fontFamily: { 
  sans: ['Inter', 'sans-serif'] 
  } 
 } 
 } 
 } 
 </script> 
 <script src="https://unpkg.com/lucide@latest"></script>
</head> 
 
<body class="relative min-h-screen flex items-center justify-center font-sans bg-[#0B0F19] overflow-hidden">
 <!-- Ambient Background Effects -->
 <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-primary/20 rounded-full mix-blend-screen filter blur-[100px] opacity-70 animate-pulse"></div>
 <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-indigo-600/20 rounded-full mix-blend-screen filter blur-[100px] opacity-70"></div>

 <div class="relative w-full max-w-md px-6 z-10">
 <!-- Logo -->
 <div class="text-center mb-8">
  <div class="inline-flex flex-col items-center gap-4 mb-4">
  <div class="w-16 h-16 bg-gradient-to-tr from-primary to-indigo-500 rounded-2xl flex items-center justify-center shadow-[0_0_30px_rgba(25,127,230,0.3)]">
   <i data-lucide="play" class="text-white text-4xl ml-1"></i>
  </div>
  <div class="text-center">
   <h1 class="text-3xl font-extrabold text-white tracking-tight">A Phim</h1>
   <p class="text-sm text-gray-400 font-medium tracking-widest uppercase mt-1">Quản Trị Hệ Thống</p>
  </div>
  </div>
 </div>

 <!-- Login Card (Glassmorphism) -->
 <div class="bg-gray-900/40 backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl p-8 transition-transform hover:scale-[1.01] duration-300">
  <h2 class="text-2xl font-bold text-white mb-2">Đăng nhập</h2>
  <p class="text-gray-400 mb-8 text-sm">Vui lòng xác thực tài khoản quản trị</p>

  <form id="loginForm" class="space-y-6">
  <div>
   <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
   <div class="relative group">
   <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-primary transition-colors"></i>
   <input type="email" id="username" required autocomplete="email"
    class="w-full pl-12 pr-4 py-3.5 bg-black/40 border border-white/10 text-white rounded-xl focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder-gray-500 outline-none"
    placeholder="admin@aphim.vn">
   </div>
  </div>

  <div>
   <label class="block text-sm font-medium text-gray-300 mb-2">Mật khẩu</label>
   <div class="relative group">
   <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-primary transition-colors"></i>
   <input type="password" id="password" required autocomplete="current-password"
    class="w-full pl-12 pr-4 py-3.5 bg-black/40 border border-white/10 text-white rounded-xl focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder-gray-500 outline-none"
    placeholder="••••••••">
   </div>
  </div>

  <div class="flex items-center justify-between">
   <label class="flex items-center cursor-pointer group">
   <input type="checkbox" class="w-4 h-4 text-primary bg-black/40 border border-white/20 rounded focus:ring-primary/50 focus:ring-offset-0 transition-all cursor-pointer accent-primary">
   <span class="ml-2 text-sm text-gray-400 group-hover:text-gray-300 transition-colors">Ghi nhớ đăng nhập</span>
   </label>
  </div>

  <button type="submit"
   class="w-full py-3.5 bg-gradient-to-r from-primary to-indigo-600 text-white font-bold rounded-xl hover:from-blue-500 hover:to-indigo-500 transition-all shadow-[0_0_20px_rgba(25,127,230,0.3)] hover:shadow-[0_0_30px_rgba(25,127,230,0.5)] active:scale-[0.98]">
   Đăng nhập
  </button>
  </form>
 </div>

 <!-- Back to site -->
 <div class="text-center mt-8">
  <a href="../index.html" class="inline-flex items-center text-sm text-gray-400 hover:text-white transition-colors group">
  <i data-lucide="arrow-left" class="w-4 h-4 mr-2 group-hover:-translate-x-1 transition-transform"></i> Quay lại trang chủ
  </a>
 </div>
 </div>

 <!-- Toast notification -->
 <div id="toast" class="fixed top-4 right-4 hidden z-50">
 <div class="bg-gray-900/90 backdrop-blur-md border border-red-500/50 rounded-xl shadow-2xl p-4">
  <div class="flex items-center gap-3">
  <div class="p-2 bg-red-500/10 rounded-lg">
   <i data-lucide="alert-circle" class="text-red-500"></i>
  </div>
  <p id="toastMessage" class="text-sm font-medium text-white"></p>
  </div>
 </div>
 </div> 
 
 <script> 
 // Auto-detect environment 
 const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
 ? 'http://localhost:5000/api' 
 : 'https://a-phim-production-c87b.up.railway.app/api'; 
 
 document.getElementById('loginForm').addEventListener('submit', async function (e) { 
 e.preventDefault(); 
 
 const username = document.getElementById('username').value; 
 const password = document.getElementById('password').value; 
 
 try { 
 // Call backend API 
 const response = await fetch(`${API_URL}/auth/login`, { 
  method: 'POST', 
  headers: { 
  'Content-Type': 'application/json' 
  }, 
  body: JSON.stringify({ 
  email: username, 
  password: password 
  }) 
 }); 
 
 const data = await response.json(); 
 
 if (data.success && data.user.role === 'admin') { 
  // Save admin token with correct key 
  localStorage.setItem('cinestream_admin_token', data.token); 
  localStorage.setItem('cinestream_admin_user', JSON.stringify(data.user)); 
 
  // Redirect to dashboard 
  window.location.href = 'dashboard.html'; 
 } else if (data.success && data.user.role !== 'admin') { 
  showToast('Bạn không có quyền truy cập admin panel'); 
 } else { 
  showToast(data.message || 'Đăng nhập thất bại'); 
 } 
 } catch (error) { 
 console.error('Login error:', error); 
 showToast('Không thể kết nối với server. Vui lòng thử lại.'); 
 } 
 }); 
 
 function showToast(message) { 
 const toast = document.getElementById('toast'); 
 const toastMessage = document.getElementById('toastMessage'); 
 
 toastMessage.textContent = message; 
 toast.classList.remove('hidden'); 
 
 setTimeout(() => { 
 toast.classList.add('hidden'); 
 }, 3000); 
 } 
 </script> 
 <script>lucide.createIcons();</script>

 <script>
 // Tự động render Lucide Icons khi DOM thay đổi (tải dữ liệu bảng/động)
 document.addEventListener("DOMContentLoaded", () => {
  if (window.lucide) lucide.createIcons();
  let isUpdating = false;
  const observer = new MutationObserver(() => {
  if (isUpdating) return;
  isUpdating = true;
  if (window.lucide) {
   try { lucide.createIcons(); } catch(e){}
  }
  setTimeout(() => { isUpdating = false; }, 100);
  });
  observer.observe(document.body, { childList: true, subtree: true });
 });
 </script>
</body> 
 
</html>
