<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Horror API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }

        .result {
            background: #2a2a2a;
            padding: 20px;
            margin: 10px 0;
            border-radius: 8px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background: #fbbf24;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }

        pre {
            background: #000;
            padding: 10px;
            overflow-x: auto;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <h1>Test Horror Movie API</h1>

    <div>
        <button onclick="testEndpoint1()">Test: /danh-sach/kinh-di</button>
        <button onclick="testEndpoint2()">Test: /v1/api/danh-sach/kinh-di</button>
        <button onclick="testEndpoint3()">Test: /v1/api/the-loai/kinh-di</button>
    </div>

    <div id="results"></div>

    <script>
        const API_BASE = 'https://phimapi.com';
        const resultsDiv = document.getElementById('results');

        async function testEndpoint1() {
            const url = `${API_BASE}/danh-sach/kinh-di?page=1`;
            await testAPI('Endpoint 1: /danh-sach/kinh-di', url);
        }

        async function testEndpoint2() {
            const url = `${API_BASE}/v1/api/danh-sach/kinh-di?page=1`;
            await testAPI('Endpoint 2: /v1/api/danh-sach/kinh-di', url);
        }

        async function testEndpoint3() {
            const url = `${API_BASE}/v1/api/the-loai/kinh-di?page=1`;
            await testAPI('Endpoint 3: /v1/api/the-loai/kinh-di', url);
        }

        async function testAPI(title, url) {
            const resultDiv = document.createElement('div');
            resultDiv.className = 'result';
            resultDiv.innerHTML = `<h3>${title}</h3><p>Loading...</p>`;
            resultsDiv.insertBefore(resultDiv, resultsDiv.firstChild);

            try {
                console.log('Testing:', url);
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                console.log('Response:', data);

                // Kiểm tra structure
                let movies = null;
                let structure = '';

                if (data.items) {
                    movies = data.items;
                    structure = 'data.items';
                } else if (data.data && data.data.items) {
                    movies = data.data.items;
                    structure = 'data.data.items';
                }

                if (movies && movies.length > 0) {
                    resultDiv.innerHTML = `
                        <h3 style="color: #10b981;">✅ ${title}</h3>
                        <p><strong>URL:</strong> ${url}</p>
                        <p><strong>Status:</strong> Success</p>
                        <p><strong>Structure:</strong> ${structure}</p>
                        <p><strong>Movies found:</strong> ${movies.length}</p>
                        <p><strong>First movie:</strong></p>
                        <pre>${JSON.stringify(movies[0], null, 2)}</pre>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <h3 style="color: #f59e0b;">⚠️ ${title}</h3>
                        <p><strong>URL:</strong> ${url}</p>
                        <p><strong>Status:</strong> No movies found</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `
                    <h3 style="color: #ef4444;">❌ ${title}</h3>
                    <p><strong>URL:</strong> ${url}</p>
                    <p><strong>Error:</strong> ${error.message}</p>
                `;
            }
        }

        // Auto test all endpoints on load
        window.addEventListener('load', () => {
            setTimeout(() => {
                testEndpoint1();
                setTimeout(() => testEndpoint2(), 1000);
                setTimeout(() => testEndpoint3(), 2000);
            }, 500);
        });
    </script>
</body>

</html>
